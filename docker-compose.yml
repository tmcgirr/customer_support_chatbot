# Local dev uses ONLY the mongo service: `docker compose up -d mongo`. The app
# itself runs on the host via `uvicorn` (:8000) and `pnpm dev` (:5173), so the
# dockerized api is NOT started by default — it lives behind the `full` profile
# and maps to :8080 so it never clashes with a local uvicorn on :8000.
#
#   Local dev:        docker compose up -d mongo   (+ uvicorn + pnpm dev on the host)
#   Full stack test:  docker compose --profile full up --build   (api on :8080)
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: ./backend
    profiles: ["full"]
    ports:
      - "8080:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017/cadre_chatbot
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - mongo

volumes:
  mongo-data:
