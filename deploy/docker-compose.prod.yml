# Production stack for the Cadre AI chatbot.
#
# Differs from staging (docker-compose.staging.yml):
#   - NO in-stack Mongo. Production uses a managed MongoDB (Atlas or self-hosted with
#     tested backups) reached via MONGO_URI in deploy/prod.env — the Atlas-vs-self-hosted
#     decision is Engineering's (doc 06 §6). Either way it is a real, non-localhost URI,
#     so the fail-closed config guard is satisfied.
#   - The `api` service is horizontally scalable and load-balanced by Caddy:
#       docker compose -f deploy/docker-compose.prod.yml --env-file deploy/prod.env \
#         up -d --build --scale api=2
#   - The worker runs as ONE supervised instance (atomic job claim makes >1 safe, but
#     one is sufficient and avoids redundant periodic scheduling).
#
# Bring up:
#   PROD_DOMAIN=chat.cadreai.com \
#     docker compose -f deploy/docker-compose.prod.yml --env-file deploy/prod.env \
#     up -d --build --scale api=2

services:
  api:
    build: ../backend
    env_file: ./prod.env
    environment:
      ENV: prod
    # No published ports — only Caddy reaches the replicas over the internal network.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build: ../backend
    command: ["uv", "run", "--no-dev", "python", "-m", "app.worker"]
    env_file: ./prod.env
    environment:
      ENV: prod
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      PROD_DOMAIN: ${PROD_DOMAIN:?set PROD_DOMAIN}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ../frontend/dist:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
